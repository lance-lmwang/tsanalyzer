<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TsAnalyzer Pro - GLOBAL NOC MATRIX</title>
    <style>
        :root {
            --bg: #020617;
            --panel: #0F172A;
            --accent: #38BDF8;
            --ok: #22C55E;
            --warn: #F59E0B;
            --crit: #EF4444;
            --latch: #F97316;
            --text: #F8FAFC;
            --text-dim: #94A3B8;
            --header-h: 60px;
            --footer-h: 36px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            height: 100vh; width: 100vw; overflow: hidden;
            display: flex; flex-direction: column;
        }
        header {
            height: var(--header-h); padding: 0 32px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid #1E293B;
            background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(12px);
            z-index: 100;
        }
        .logo { font-size: 1.2rem; font-weight: 900; letter-spacing: 1px; color: var(--accent); }
        .clock { font-family: 'JetBrains Mono', monospace; font-size: 1.1rem; color: var(--text-dim); }

        main {
            flex-grow: 1; padding: 16px;
            display: grid; gap: 12px;
            align-content: start; justify-content: center;
            overflow-y: auto;
        }

        .stream-card {
            background: var(--panel);
            border: 1px solid #1E293B;
            border-radius: 4px;
            width: 320px;
            display: flex; flex-direction: column;
            transition: all 0.2s ease;
        }

        /* Tiered Section Headers */
        .tier-label {
            font-size: 0.55rem; font-weight: 800; color: var(--text-dim);
            text-transform: uppercase; letter-spacing: 1px;
            padding: 4px 12px; background: rgba(255,255,255,0.03);
            border-bottom: 1px solid #1E293B;
        }

        /* Card States */
        .stream-card.stable { border-top: 3px solid var(--ok); }
        .stream-card.degraded { border-top: 3px solid var(--warn); }
        .stream-card.failure { border-top: 3px solid var(--crit); animation: card-pulse 2s infinite; }
        @keyframes card-pulse { 0% { border-top-color: var(--crit); } 50% { border-top-color: #7f1d1d; } 100% { border-top-color: var(--crit); } }

        .card-header {
            padding: 8px 12px; display: flex; justify-content: space-between; align-items: center;
        }
        .stream-id { font-weight: 900; font-size: 0.8rem; }
        .health-score { font-family: monospace; font-weight: 900; font-size: 0.8rem; }

        /* Tables */
        .metrics-table {
            width: 100%; border-collapse: collapse;
            font-size: 0.7rem;
        }
        .metrics-table td { padding: 4px 12px; border-bottom: 1px solid #1E293B; }
        .m-key { color: var(--text-dim); font-weight: 500; }
        .m-val { text-align: right; font-family: 'JetBrains Mono', monospace; font-weight: 700; color: #FFF; }
        .m-unit { font-size: 0.6rem; color: var(--text-dim); margin-left: 2px; font-weight: normal; }

        /* LED Panel */
        .led-panel {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 2px; padding: 8px 12px;
        }
        .led {
            height: 16px; border-radius: 1px;
            font-size: 0.5rem; font-weight: 900;
            display: flex; align-items: center; justify-content: center;
            background: #1E293B; color: #334155;
        }
        .led.active { background: #064e3b; color: var(--ok); }
        .led.error { background: var(--crit); color: #FFF; animation: led-blink 0.5s infinite; }
        @keyframes led-blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .summary-bar {
            height: var(--footer-h); background: #0F172A; border-top: 1px solid #1E293B;
            display: flex; align-items: center; padding: 0 32px; gap: 40px;
            font-size: 0.7rem; color: var(--text-dim);
        }
        .summary-bar b { color: var(--accent); }
    </style>
</head>
<body>

<header>
    <div class="logo">TSA<span style="color:#FFF">PRO</span> NOC - PLANE 1</div>
    <div style="display:flex; gap:32px; align-items:center">
        <div id="conn-status" style="font-size:0.7rem; font-weight:800">* LIVE DATA</div>
        <div class="clock" id="clock">00:00:00</div>
    </div>
</header>

<main id="dashboard-grid"></main>

<div class="summary-bar">
    <div>STREAMS: <b id="s-count">0</b></div>
    <div>AGGREGATE: <b id="s-bw">0.00 Mbps</b></div>
    <div style="margin-left:auto">SYSTEM STATUS: <b style="color:var(--ok)">OPTIMAL</b></div>
</div>

<script>
    const GRID = document.getElementById('dashboard-grid');
    const REFRESH_MS = 1000;

    function updateClock() {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB');
    }
    setInterval(updateClock, 1000);

    async function tick() {
        try {
            // Auto-align IP
            const host = window.location.hostname || 'localhost';
            const res = await fetch(`http://${host}:8088/metrics`);
            const text = await res.text();
            const data = parse(text);
            render(data);
            document.getElementById('conn-status').innerText = '* LIVE DATA';
            document.getElementById('conn-status').style.color = 'var(--ok)';
        } catch (e) {
            document.getElementById('conn-status').innerText = '* CONNECTION LOST';
            document.getElementById('conn-status').style.color = 'var(--crit)';
        }
    }

    function parse(text) {
        const streams = {};
        const lines = text.split('\n');
        lines.forEach(line => {
            if (line.startsWith('#') || !line.includes('{')) return;

            // Improved Regex
            const match = line.match(/^([a-z0-9_]+)\{[^}]*stream_id="([^"]+)"[^}]*\} ([\d.e+-]+)/);
            if (!match) return;

            const [_, name, id, val] = match;
            if (!streams[id]) {
                streams[id] = {
                    id, health: 100, bitrate: 0, rtt: 0, fps: 0, gop: 0, sync: 0, rst: 999,
                    sync_err: 0, pat_err: 0, pmt_err: 0, cc_err: 0
                };
            }
            const v = parseFloat(val);

            // Align metric names
            if (name === 'tsa_physical_bitrate_bps') streams[id].bitrate = v;
            if (name === 'tsa_health_score') streams[id].health = v;
            if (name === 'tsa_srt_rtt_ms') streams[id].rtt = v;
            if (name === 'tsa_essence_video_fps') streams[id].fps = v;
            if (name === 'tsa_gop_ms') streams[id].gop = v;
            if (name === 'tsa_essence_av_sync_ms') streams[id].sync = v;
            if (name === 'tsa_rst_network_seconds') streams[id].rst = v;

            // ETR 290 P1 alignment
            if (name === 'tsa_tr101290_p1_sync_loss' || name === 'tsa_sync_loss_errors') streams[id].sync_err += v;
            if (name === 'tsa_tr101290_p1_pat_error' || name === 'tsa_pat_error_count') streams[id].pat_err += v;
            if (name === 'tsa_pmt_error_count') streams[id].pmt_err += v;
            if (name === 'tsa_tr101290_p1_cc_error' || name === 'tsa_continuity_errors_total') streams[id].cc_err += v;
        });
        return streams;
    }
    function render(streams) {
        const ids = Object.keys(streams).sort();
        let totalBw = 0;

        ids.forEach(id => {
            const s = streams[id];
            totalBw += s.bitrate;
            let card = document.getElementById(`card-${id}`);
            if (!card) {
                card = document.createElement('div');
                card.id = `card-${id}`;
                GRID.appendChild(card);
            }

            let status = 'stable';
            if (s.health < 70 || s.bitrate === 0) status = 'failure';
            else if (s.health < 90) status = 'degraded';

            card.className = `stream-card ${status}`;
            card.innerHTML = `
                <div class="card-header">
                    <span class="stream-id">${id}</span>
                    <span class="health-score" style="color:${s.health > 90 ? 'var(--ok)' : 'var(--crit)'}">${s.health.toFixed(0)}%</span>
                </div>

                <div class="tier-label">Tier 1: Link & Physical</div>
                <table class="metrics-table">
                    <tr><td class="m-key">Throughput</td><td class="m-val">${(s.bitrate/1000000).toFixed(2)}<span class="m-unit">Mbps</span></td></tr>
                    <tr><td class="m-key">SRT RTT</td><td class="m-val">${s.rtt}<span class="m-unit">ms</span></td></tr>
                    <tr><td class="m-key">RST Survival</td><td class="m-val" style="color:${s.rst < 10 ? 'var(--crit)' : 'inherit'}">${s.rst > 3600 ? '>1h' : s.rst.toFixed(1) + 's'}</td></tr>
                </table>

                <div class="tier-label">Tier 2: ETR 290 Compliance</div>
                <div class="led-panel">
                    <div class="led ${s.sync_err > 0 ? 'error' : 'active'}">SYNC</div>
                    <div class="led ${s.pat_err > 0 ? 'error' : 'active'}">PAT</div>
                    <div class="led ${s.pmt_err > 0 ? 'error' : 'active'}">PMT</div>
                    <div class="led ${s.cc_err > 0 ? 'error' : 'active'}">CC</div>
                </div>

                <div class="tier-label">Tier 3: Essence & Payload</div>
                <table class="metrics-table" style="border-bottom:none">
                    <tr><td class="m-key">Video FPS</td><td class="m-val">${s.fps.toFixed(1)}</td></tr>
                    <tr><td class="m-key">GOP Size</td><td class="m-val">${s.gop}<span class="m-unit">ms</span></td></tr>
                    <tr><td class="m-key">A/V Sync</td><td class="m-val" style="color:${Math.abs(s.sync) > 100 ? 'var(--warn)' : 'inherit'}">${s.sync}<span class="m-unit">ms</span></td></tr>
                </table>
            `;
        });

        document.getElementById('s-count').innerText = ids.length;
        document.getElementById('s-bw').innerText = (totalBw / 1000000).toFixed(2) + ' Mbps';

        // Layout logic
        const cols = ids.length > 4 ? Math.ceil(ids.length / 2) : ids.length;
        GRID.style.gridTemplateColumns = `repeat(${cols}, min-content)`;
    }

    setInterval(tick, REFRESH_MS);
</script>
</body>
</html>
