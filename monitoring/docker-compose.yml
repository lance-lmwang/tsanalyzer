version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: tsa-prometheus
    network_mode: host
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/rules.yml:/etc/prometheus/rules.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: tsa-grafana
    network_mode: host
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - tsa-grafana-data:/var/lib/grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/tsa_global_wall.json
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: tsa-loki
    network_mode: host
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

volumes:
  tsa-grafana-data:
